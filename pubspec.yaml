name: depo_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management, Navigation & DI
  get: ^4.6.6

  # Networking
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  sqflite: ^2.3.2
  path: ^1.9.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.0

  # URL Launcher (buka halaman scan-web QRIS di browser)
  url_launcher: ^6.3.0

  # UI
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  fl_chart: ^0.68.0

  # Utilities
  uuid: ^4.3.3
  logger: ^2.2.0
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/fluks_logo.png
